name: Print secret

on:
  workflow_dispatch:

jobs:
  build-deploy:
    name: Print secret
    runs-on: ubuntu-latest
    steps:
      - name: Print secret
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        run: |
          echo "Trick to echo GitHub Actions Secret:  "
          echo "${{secrets.TAURI_PRIVATE_KEY}}" | xxd -ps
